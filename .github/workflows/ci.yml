name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install dependencies
        run: |
          pip install uv
          uv venv
          uv pip install -r requirements.txt
      - name: Run tests
        run: |
          DB_BACKEND=sqlite SQLITE_DB_PATH=nfl_data.db uv run python -m pytest tests/ -v --cov=. --cov-report=xml
        env:
          DB_BACKEND: sqlite
          SQLITE_DB_PATH: nfl_data.db
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  pipeline-database-matrix:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_DATABASE: nfl_test
          MYSQL_USER: nfl
          MYSQL_PASSWORD: nfltest
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -unfl -pnfltest"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install dependencies
        run: |
          pip install uv
          uv venv
          uv pip install -r requirements.txt
      - name: Run MySQL queue and lease matrix
        env:
          TEST_DB_BACKEND: mysql
          TEST_DB_URL: mysql://nfl:nfltest@127.0.0.1:3306/nfl_test
        run: uv run python -m pytest tests/test_pipeline_database_matrix.py -v

  lint-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install and lint
        working-directory: frontend
        run: |
          npm ci
          npm run lint
          npm run build
